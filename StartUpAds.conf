^https?:\/\/api\.m\.taobao\.com\/gw\/mtop\.taobao\.idle\.home\.welcome\/ url reject-200
^https?:\/\/amdc\.m\.taobao\.com\/amdc\/mobileDispatch url reject-dict
^https?:\/\/.*\.alicdn\.com\/imgextra\/.*\/O1CN01.* url reject
^https?:\/\/link-crops\.oss-cn-hangzhou\.aliyuncs\.com\/ url reject

# ======= 字节跳动 (抖音/穿山甲) ======= #
