^https?:\/\/app\.bilibili\.com\/x\/v2\/feed\/index\/url\/.* url reject

# ======= 隐私追踪与大数据补丁 (反杀熟辅助) ======= #
# 1. 拦截友盟统计 (国内最大的移动统计 SDK，覆盖 90% App)
^https?:\/\/.*\.umeng\.com\/.* url reject-200
^https?:\/\/.*\.umengcloud\.com\/.* url reject-200
^https?:\/\/log\.umsns\.com\/.* url reject-200

# 2. 拦截阿里系隐私采集 (阻止上传设备指纹)
^https?:\/\/admc\.m\.taobao\.com\/gw\/mtop\.common\.getMap\/ url reject
^https?:\/\/otas\.alibaba\.com\/gw\/mtop\.common\.launchAppGuide\/ url reject

# 3. 拦截拼多多/字节等通用分析接口
^https?:\/\/analysis\.pinduoduo\.com\/.* url reject
^https?:\/\/.*\.snssdk\.com\/service\/2\/app_log\/ url reject-200
^https?:\/\/.*\.snssdk\.com\/video\/openapi\/v1\/.* url reject

# 4. 拦截腾讯广点通追踪
^https?:\/\/v\.gdt\.qq\.com\/gdt_mview\.fcg url reject
