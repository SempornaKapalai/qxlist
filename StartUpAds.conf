hostname = amdc.m.taobao.com, guide-acs.m.taobao.com, api.m.taobao.com, *.oss-cn-hangzhou.aliyuncs.com, *.snssdk.com, *.amemv.com, pan.baidu.com, *.xiaohongshu.com, hdt.meituan.com, api.m.jd.com, *.gdt.qq.com, ov.v.qq.com
