# --- StartUpAds.conf 全量增强版 (2026.03) ---

[rewrite_local]
# ================= [1] 阿里系 (闲鱼/淘宝/支付宝) =================
# 拦截启动引导、开屏配置、首页弹窗、AMDC 调度
^https?:\/\/guide-acs\.m\.taobao\.com\/gw\/mtop\.common\.launchAppGuide\/ url reject-200
^https?:\/\/api\.m\.taobao\.com\/gw\/mtop\.taobao\.idle\.home\.welcome\/ url reject-200
^https?:\/\/amdc\.m\.taobao\.com\/amdc\/mobileDispatch url reject-dict
^https?:\/\/.*\.alicdn\.com\/imgextra\/.*单独广告位.* url reject

# ================= [2] 字节跳动 (抖音/头条/穿山甲/西瓜) =================
# 穿山甲 SDK 是重中之重 (很多第三方 App 广告都接的它)
^https?:\/\/ix\.snssdk\.com\/api\/ad\/v1\/setting\/ url reject-dict
^https?:\/\/.*\.pglstatp-toutiao\.com\/obj\/ad-pattern\/ url reject
^https?:\/\/.*\.snssdk\.com\/api\/ad\/.*\/settings\/ url reject-dict
^https?:\/\/v.\.amemv\.com\/aweme\/v1\/ad\/settings\/ url reject-dict
^https?:\/\/.*\.snssdk\.com\/service\/2\/app_log\/ url reject-200

# ================= [3] 腾讯系 (视频/新闻/QQ/音乐) =================
# 广点通 (GDT) 全系广告拦截
^https?:\/\/mi\.gdt\.qq\.com\/gdt_mview\.fcg url reject
^https?:\/\/v\.gdt\.qq\.com\/gdt_mview\.fcg url reject
^https?:\/\/ov\.v\.qq\.com\/.*splash.* url reject
^https?:\/\/news\.l\.qq\.com\/get_ads url reject

# ================= [4] 百度系 (网盘/手百/贴吧) =================
^https?:\/\/pan\.baidu\.com\/res\/static\/cms\/.*\.json url reject
^https?:\/\/mobads\.baidu\.com\/cpro\/ui\/mads\.php url reject
^https?:\/\/wn\.pos\.baidu\.com\/adx\.php url reject

# ================= [5] 美团/京东/拼多多/携程 =================
^https?:\/\/hdt\.meituan\.com\/ad\/v3 url reject
^https?:\/\/api\.m\.jd\.com\/client\.action\?functionId=startSplash url reject
^https?:\/\/api\.m\.jd\.com\/client\.action\?functionId=fc_get_config url reject-dict
^https?:\/\/m\.ctrip\.com\/restapi\/soa2\/10290\/getAdvs url reject

# ================= [6] B站/小红书/知乎 =================
^https?:\/\/app\.bilibili\.com\/x\/v2\/feed\/index\/url\/.*广告.* url reject
^https?:\/\/edith\.xiaohongshu\.com\/api\/sns\/v1\/system_service\/splash_config url reject-dict
^https?:\/\/api\.zhihu\.com\/launch_ad url reject

[mitm]
# 必须包含这些 Hostname 才能解密 HTTPS 流量
hostname = amdc.m.taobao.com, guide-acs.m.taobao.com, api.m.taobao.com, *.oss-cn-hangzhou.aliyuncs.com, *.snssdk.com, *.amemv.com, pan.baidu.com, *.xiaohongshu.com, hdt.meituan.com, api.m.jd.com, *.gdt.qq.com, ov.v.qq.com, m.ctrip.com, api.zhihu.com
